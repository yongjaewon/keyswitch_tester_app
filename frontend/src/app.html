<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=1024, height=600, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a1a;
      }
      #app-container {
        width: 1024px;
        height: 600px;
        overflow: hidden;
        position: relative;
        background: #f3f4f6;
      }
      @media (prefers-color-scheme: dark) {
        #app-container {
          background: #111827;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="app-container">
      <div style="width: 100%; height: 100%;">%sveltekit.body%</div>
    </div>
  </body>
</html>
